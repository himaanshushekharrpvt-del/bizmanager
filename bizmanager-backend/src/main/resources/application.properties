spring.application.name=bizmanager-backend

# --- MySQL (default) ---
spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:bizmanager}}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- JWT ---
# Generate your own random 256-bit+ secret for real use - this default is for local dev only.
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-before-deploying-anywhere-real-0123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:43200000}

# --- Ribbon low-stock alert threshold (can also be overridden per business later) ---
app.ribbons.low-stock-threshold=200

# --- Uploads / misc ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=${PORT:8080}
