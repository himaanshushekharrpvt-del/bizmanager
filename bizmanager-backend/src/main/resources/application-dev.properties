# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# No MySQL install needed - everything lives in memory and resets on restart.
# H2 console at http://localhost:8080/h2-console (jdbc url: jdbc:h2:mem:bizmanager)

spring.datasource.url=jdbc:h2:mem:bizmanager;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
